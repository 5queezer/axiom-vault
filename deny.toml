# cargo-deny configuration for AxiomVault
# https://embarkstudios.github.io/cargo-deny/
#
# This is a security-critical encrypted vault application.
# Policies are strict by default -- exceptions must be justified.

# ============================================================================
# Graph — how the dependency graph is constructed
# ============================================================================
[graph]
all-features = true

# ============================================================================
# Advisories — check for known vulnerabilities and unmaintained crates
# ============================================================================
[advisories]
# Advisories to ignore (add RUSTSEC IDs here with justification).
ignore = [
    # instant -- unmaintained, pulled in transitively via reed-solomon-erasure → parking_lot 0.11.
    # reed-solomon-erasure pins an old parking_lot; no alternative available yet.
    { id = "RUSTSEC-2024-0384", reason = "transitive dep via reed-solomon-erasure; no update available" },
]

# ============================================================================
# Licenses — allow common permissive OSS licenses
# ============================================================================
[licenses]
# Confidence threshold for license detection by askalono.
confidence-threshold = 0.8

# List of allowed licenses (SPDX identifiers).
# Only permissive / weak-copyleft licenses are allowed.
# GPL variants are denied by omission -- add exceptions below if needed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
]

# Workspace crates that aren't published don't need license checks.
[licenses.private]
ignore = true

# Per-crate license exceptions. Each must include a justification.

# webpki-root-certs and webpki-roots contain Mozilla's CA certificate bundle.
# CDLA-Permissive-2.0 is a permissive data license — it applies to the
# certificate data, not to code we execute. Safe for inclusion.
[[licenses.exceptions]]
allow = ["CDLA-Permissive-2.0"]
crate = "webpki-root-certs"

[[licenses.exceptions]]
allow = ["CDLA-Permissive-2.0"]
crate = "webpki-roots"

# ============================================================================
# Bans — prevent duplicate or problematic crates
# ============================================================================
[bans]
# Warn on multiple versions of the same crate. Duplicates increase
# attack surface and binary size.
multiple-versions = "warn"
# Wildcards in dependency versions are too loose but common in the ecosystem.
wildcards = "allow"
# Use simplest path for duplicate highlighting in dotgraphs.
highlight = "simplest-path"

# Crates that are allowed to have duplicate versions (transitive deps we
# cannot easily control). Add entries with justification.
skip = [
    #{ crate = "some-crate@0.1", reason = "transitive dup from X and Y" },
]

# ============================================================================
# Sources — restrict where crates can be fetched from
# ============================================================================
[sources]
# Only allow crates from crates.io. No unknown git repos or registries.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
